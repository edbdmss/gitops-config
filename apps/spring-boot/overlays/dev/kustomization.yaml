apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: spring-boot-dev
images:
- name: edbdmss/gitops-app
  newName: edbdmss/gitops-app
  newTag: sha-b066954
- name: nginx
  newTag: 1.27-alpine
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: gitops-app
